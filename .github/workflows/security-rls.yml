name: Security & RLS checks

# Gates new commits so the previously fixed findings cannot regress:
#   plan_writable_by_user, platform_accts_public, contacts_public_read,
#   inventory_items_public_role, profiles_public_read,
#   profiles_plan_field_user_writable
# Also uploads a human-readable report + policy diff for review.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: RLS policy guardrail + behaviour tests
        env:
          # Configure in repo settings → Secrets → Actions.
          # Use the project's pooled superuser connection string.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [[ -z "${SUPABASE_DB_URL}" ]]; then
            echo "::error::SUPABASE_DB_URL secret is not configured."
            exit 1
          fi
          bash scripts/check-rls.sh

      - name: Upload RLS report + policy diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-report
          path: scripts/.rls-report/
          if-no-files-found: warn
          retention-days: 30
